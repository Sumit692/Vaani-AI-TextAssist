<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>💬 Chat - AI TextAssist</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-glow: rgba(0, 198, 255, 0.75);
            --container-bg: rgba(13, 32, 112, 0.85);
            --text-color: #fff;
            --border-color: rgba(255, 255, 255, 0.16);
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 20px;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background:
                radial-gradient(circle at 0% 0%, #1a2a6f 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, #0f2027 0%, transparent 55%),
                radial-gradient(circle at 50% 120%, #182848 0%, #0b102b 50%, #050819 100%);
            background-attachment: fixed;
            box-sizing: border-box;
        }

        .container {
            background: var(--container-bg);
            backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 26px 60px rgba(0, 0, 0, 0.55);
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* --- HEADER AREA --- */
        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        .chat-header h1 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 700;
            color: #ffde59;
            text-shadow: 0 0 12px rgba(255, 222, 89, 0.6);
        }

        .clear-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 12px;
            color: #ff7675;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .clear-btn:hover {
            background: rgba(255, 118, 117, 0.2);
            border-color: #ff7675;
            transform: translateY(-1px);
        }

        /* --- CHAT CONTAINER --- */
        .chat-container {
            height: 450px;
            overflow-y: auto;
            border-radius: 16px;
            padding: 20px;
            background-color: rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            flex-direction: column;
            gap: 14px;
            scroll-behavior: smooth;
        }

        /* Custom Scrollbar */
        .chat-container::-webkit-scrollbar {
            width: 8px;
        }
        .chat-container::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
        }
        .chat-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }
        .chat-container::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 80%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            align-items: flex-end;
        }

        .message.bot {
            align-self: flex-start;
            align-items: flex-start;
        }

        .message p {
            margin: 0;
            padding: 12px 18px;
            border-radius: 16px;
            white-space: pre-wrap;
            line-height: 1.5;
            font-size: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        }

        .message.user p {
            background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .message.bot p {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            color: #f1f2f6;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* --- TYPING LOADER --- */
        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 14px 22px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            align-self: flex-start;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        }

        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            animation: bounce 1.2s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }

        /* --- INPUT AREA --- */
        .input-area {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        #question-input {
            flex-grow: 1;
            padding: 14px 20px;
            border-radius: 14px;
            border: 1px solid var(--border-color);
            background: rgba(0, 0, 0, 0.25);
            color: #fff;
            font-family: inherit;
            font-size: 15px;
            outline: none;
            transition: all 0.25s ease;
        }

        #question-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        #question-input:focus {
            border-color: #00c6ff;
            box-shadow: 0 0 10px rgba(0, 198, 255, 0.3);
            background: rgba(0, 0, 0, 0.4);
        }

        #ask-button {
            padding: 14px 24px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            color: white;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.25s ease;
            box-shadow: 0 8px 20px rgba(0, 114, 255, 0.35);
        }

        #ask-button:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 25px rgba(0, 114, 255, 0.55);
        }

        .back-link {
            align-self: flex-start;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 18px;
            background-color: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--border-color);
            text-decoration: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.25s ease;
        }

        .back-link:hover {
            background-color: rgba(255, 255, 255, 0.16);
            transform: translateX(-2px);
        }
    </style>
</head>

<body>

<div class="container">
    <!-- CHAT HEADER -->
    <div class="chat-header">
        <h1>💬 Ask the Document</h1>
        <button id="clear-button" class="clear-btn">🗑️ Clear Chat</button>
    </div>

    <!-- CHAT CONTAINER -->
    <div class="chat-container" id="chat-container">
        <div class="message bot">
            <p>Hello! Ask me anything about the document you uploaded, or let's just start a conversation! I'm here to help.</p>
        </div>
    </div>

    <!-- INPUT AREA -->
    <div class="input-area">
        <input type="text" id="question-input" placeholder="Ask a question or say hello..." autocomplete="off" />
        <button id="ask-button">Send</button>
    </div>

    <!-- BACK BUTTON -->
    <a href="/?task_id={{ task_id }}" class="back-link">← Dashboard</a>
</div>

<script>
const taskId = "{{ task_id }}";
const input = document.getElementById("question-input");
const chatContainer = document.getElementById("chat-container");
const askButton = document.getElementById("ask-button");
const clearButton = document.getElementById("clear-button");

// Auto-focus input on load
input.focus();

// Fetch existing chat history on load
document.addEventListener("DOMContentLoaded", () => {
    fetch(`/status/${taskId}`)
        .then(response => response.json())
        .then(data => {
            if (data.chat_history && data.chat_history.length > 0) {
                // Clear initial placeholder
                chatContainer.innerHTML = '';
                
                // Render history
                data.chat_history.forEach(msg => {
                    appendMessage(msg.role === 'user' ? 'user' : 'bot', msg.text);
                });
                
                scrollChatToBottom();
            }
        })
        .catch(err => console.error("Error fetching history:", err));
});

function appendMessage(sender, text) {
    const msgDiv = document.createElement("div");
    msgDiv.className = `message ${sender}`;
    msgDiv.innerHTML = `<p>${text}</p>`;
    chatContainer.appendChild(msgDiv);
    scrollChatToBottom();
}

function showTypingIndicator() {
    const indicator = document.createElement("div");
    indicator.className = "typing-indicator";
    indicator.id = "typing-indicator";
    indicator.innerHTML = "<span></span><span></span><span></span>";
    chatContainer.appendChild(indicator);
    scrollChatToBottom();
    return indicator;
}

function scrollChatToBottom() {
    chatContainer.scrollTop = chatContainer.scrollHeight;
}

async function sendQuestion() {
    const question = input.value.trim();
    if (!question) return;

    // Show user message
    appendMessage('user', question);
    input.value = "";

    // Show typing indicator
    const typingIndicator = showTypingIndicator();

    try {
        const response = await fetch("/ask", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                task_id: taskId,
                question: question
            })
        });

        const data = await response.json();
        
        // Remove typing indicator
        typingIndicator.remove();

        // Show bot message
        appendMessage('bot', data.answer || "No response received.");

    } catch (error) {
        typingIndicator.remove();
        appendMessage('bot', "Error: Could not connect to the server.");
    }
}

// Clear Chat handler
clearButton.addEventListener("click", async () => {
    if (!confirm("Are you sure you want to clear this conversation history?")) return;
    
    try {
        const response = await fetch("/clear_chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ task_id: taskId })
        });
        
        const data = await response.json();
        if (data.status === 'success') {
            chatContainer.innerHTML = `
                <div class="message bot">
                    <p>Conversation history cleared. How can I help you today?</p>
                </div>
            `;
            input.focus();
        }
    } catch (err) {
        console.error("Error clearing chat:", err);
    }
});

// Button click
askButton.addEventListener("click", sendQuestion);

// Press Enter to send
input.addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendQuestion();
    }
});
</script>

</body>
</html>
